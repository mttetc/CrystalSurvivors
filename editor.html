<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crystal Survivors - Map Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
    }

    #app {
      display: grid;
      grid-template-rows: 40px 1fr 28px;
      grid-template-columns: 260px 1fr 220px;
      grid-template-areas:
        "toolbar toolbar toolbar"
        "palette canvas layers"
        "status  status  status";
      height: 100vh;
    }

    /* ─── Toolbar ─── */
    #toolbar {
      grid-area: toolbar;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 4px;
    }

    #toolbar button {
      background: #1a1a40;
      border: 1px solid #0f3460;
      color: #e0e0e0;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }

    #toolbar button:hover { background: #0f3460; }
    #toolbar button.active { background: #e94560; border-color: #e94560; }

    .toolbar-sep {
      width: 1px;
      height: 24px;
      background: #0f3460;
      margin: 0 4px;
    }

    /* ─── Tileset Palette ─── */
    #tileset-panel {
      grid-area: palette;
      background: #16213e;
      border-right: 1px solid #0f3460;
      overflow-y: auto;
      padding: 4px;
    }

    .tileset-section {
      margin-bottom: 2px;
    }

    .tileset-header {
      background: #1a1a40;
      padding: 6px 8px;
      cursor: pointer;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 600;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tileset-header:hover { background: #0f3460; }

    .tileset-header .arrow {
      transition: transform 0.2s;
      font-size: 10px;
    }

    .tileset-header.open .arrow { transform: rotate(90deg); }

    .tileset-grid {
      display: none;
      flex-wrap: wrap;
      padding: 4px 0;
      gap: 1px;
    }

    .tileset-grid.open { display: flex; }

    .tile-frame {
      width: 32px;
      height: 32px;
      cursor: pointer;
      image-rendering: pixelated;
      border: 1px solid transparent;
      border-radius: 2px;
    }

    .tile-frame:hover { border-color: #e94560; }
    .tile-frame.selected { border-color: #e94560; background: rgba(233, 69, 96, 0.2); }

    /* ─── Canvas ─── */
    #canvas-container {
      grid-area: canvas;
      overflow: hidden;
      position: relative;
      background: #0a0a1a;
    }

    #editor-canvas {
      display: block;
      image-rendering: pixelated;
      cursor: crosshair;
    }

    /* ─── Layer Panel ─── */
    #layer-panel {
      grid-area: layers;
      background: #16213e;
      border-left: 1px solid #0f3460;
      padding: 8px;
    }

    .panel-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .layer-row {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 2px;
      font-size: 13px;
      gap: 8px;
    }

    .layer-row:hover { background: #1a1a40; }
    .layer-row.active { background: #0f3460; }

    .layer-visibility {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      opacity: 0.8;
    }

    .layer-visibility:hover { opacity: 1; }
    .layer-visibility.hidden { opacity: 0.3; }

    .layer-name { flex: 1; }

    /* ─── Map Settings ─── */
    .map-settings {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #0f3460;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 12px;
    }

    .setting-label { color: #888; }
    .setting-value { color: #e0e0e0; font-weight: 600; }

    /* ─── Status Bar ─── */
    #status-bar {
      grid-area: status;
      background: #16213e;
      border-top: 1px solid #0f3460;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 11px;
      color: #888;
      gap: 16px;
    }

    .status-item { white-space: nowrap; }
    .status-item span { color: #e0e0e0; }

    /* ─── New Map Dialog ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 20px;
      min-width: 300px;
    }

    .modal h3 {
      margin-bottom: 16px;
      font-size: 16px;
    }

    .modal label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    .modal input, .modal select {
      width: 100%;
      background: #1a1a40;
      border: 1px solid #0f3460;
      color: #e0e0e0;
      padding: 6px 8px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .modal-actions button {
      padding: 6px 16px;
      border-radius: 4px;
      border: 1px solid #0f3460;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-primary { background: #e94560; border-color: #e94560 !important; color: white; }
    .btn-secondary { background: #1a1a40; color: #e0e0e0; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #e94560; }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar"></div>
    <div id="tileset-panel"></div>
    <div id="canvas-container">
      <canvas id="editor-canvas"></canvas>
    </div>
    <div id="layer-panel"></div>
    <div id="status-bar"></div>
  </div>

  <!-- New Map Dialog -->
  <div class="modal-overlay" id="new-map-dialog">
    <div class="modal">
      <h3>New Map</h3>
      <label for="map-preset">Preset</label>
      <select id="map-preset">
        <option value="50">Small (50 x 50)</option>
        <option value="94" selected>Standard (94 x 94)</option>
        <option value="150">Large (150 x 150)</option>
        <option value="custom">Custom...</option>
      </select>
      <div id="custom-size" style="display:none">
        <label for="map-width-input">Width (tiles)</label>
        <input type="number" id="map-width-input" min="10" max="300" value="94" />
        <label for="map-height-input">Height (tiles)</label>
        <input type="number" id="map-height-input" min="10" max="300" value="94" />
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="new-map-cancel">Cancel</button>
        <button class="btn-primary" id="new-map-create">Create</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/editor/main.ts"></script>
</body>
</html>
